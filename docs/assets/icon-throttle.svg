<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="throttleBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="throttleGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes alertPulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }
    @keyframes ringPulse {
      0%, 100% { r: 22; opacity: 0.1; }
      50% { r: 26; opacity: 0.05; }
    }
    .alert-pulse {
      transform-origin: 32px 32px;
      animation: alertPulse 1.5s ease-in-out infinite;
    }
    .ring-pulse {
      animation: ringPulse 1.5s ease-in-out infinite;
    }
  </style>

  <rect width="64" height="64" rx="12" fill="url(#throttleBg)"/>

  <!-- Pulsing ring -->
  <circle class="ring-pulse" cx="32" cy="32" r="22" fill="none" stroke="#fbbf24" stroke-width="1"/>

  <!-- Warning triangle -->
  <g class="alert-pulse" filter="url(#throttleGlow)">
    <path d="M32,14 L48,46 L16,46 Z" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linejoin="round"/>
    <line x1="32" y1="24" x2="32" y2="36" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="32" cy="41" r="1.5" fill="#fbbf24"/>
  </g>

  <!-- Small downward arrows indicating throttling -->
  <g opacity="0.4">
    <path d="M12,20 L12,28 L9,25 M12,28 L15,25" fill="none" stroke="#ef4444" stroke-width="1" stroke-linecap="round"/>
    <path d="M52,20 L52,28 L49,25 M52,28 L55,25" fill="none" stroke="#ef4444" stroke-width="1" stroke-linecap="round"/>
  </g>
</svg>